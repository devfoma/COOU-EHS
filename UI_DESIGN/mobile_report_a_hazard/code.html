<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Campus Safe - Report Hazard</title>

        .glass-panel {

        }

            box-shadow: 0 0 15px currentColor;

                "on-error": "#690005",
                "tertiary-fixed": "#ffddb8",

                "surface-variant": "#273647",
                "on-surface-variant": "#c6c6cd",
                "on-tertiary-fixed": "#2a1700",
                "secondary-fixed": "#6bff8f",
                "on-secondary-fixed-variant": "#005321",
                "tertiary-fixed-dim": "#ffb95f",
                "error-container": "#93000a",
                "on-primary-fixed-variant": "#3f465c",
                "surface-container-highest": "#273647",
                "surface-container": "#122131",
                "on-tertiary": "#472a00",

                "surface-bright": "#2c3a4c",
                "secondary-container": "#00b954",

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface min-h-screen pb-32">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-gutter h-16 bg-surface-container/70 dark:bg-surface-container-high/70 backdrop-blur-xl border-b border-white/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="security">security</span>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-secondary">Campus Safe</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary/20">
<img class="w-full h-full object-cover" data-alt="A professional student identification portrait for a campus safety portal. The subject is a young adult with a friendly but serious expression, wearing a navy blue university sweatshirt. The background is a softly blurred modern campus hallway with cool architectural lighting. The overall aesthetic is clean, trustworthy, and high-fidelity, following a dark-themed corporate design." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCVzEsglxWSfIXGyCcDEuE_e95inFa4bkOMzpykVHyZOVHqO6dEs8HpUY1Cg4gB4cGYAm0AKocWYN5DicOY9_nwgxjatU-Vm057VrOmszz_Sz2Fx1VqcCnjDgaR5hToG0jyiXP-X-Pe_3FviUzXCccFaxDXEK6M9JzYcakUUlXqBFXwmvw57_2rN2H1xVASY7VQWvDWxRwNZEM19vk29hmrTINUb4WJkCDtpsPKQlojdpFKCO5K32LemTcLiEZLcmQ2FQFBIEF9YWwH"/>
</div>
</header>
<main class="pt-24 px-gutter max-w-md mx-auto space-y-6">
<!-- Title & Intro -->
<section>
<h2 class="font-headline-lg text-headline-lg-mobile text-on-surface mb-1">Report Hazard</h2>
<p class="font-body-sm text-on-surface-variant">Immediate notification for campus safety authorities. Please provide accurate details.</p>
</section>
<!-- Form Content -->
<div class="space-y-6">
<!-- Category Selection -->
<div class="space-y-3">
<label class="font-label-md text-label-md text-primary uppercase tracking-wider">Hazard Category</label>
<div class="grid grid-cols-3 gap-2">
<button class="glass-panel py-3 rounded-xl flex flex-col items-center justify-center gap-1 transition-all active:scale-95 border-primary/20 bg-primary-container/20 hover:bg-primary-container/40">
<span class="material-symbols-outlined text-primary" data-icon="delete">delete</span>
<span class="font-label-md text-[10px]">Waste</span>
</button>
<button class="glass-panel py-3 rounded-xl flex flex-col items-center justify-center gap-1 transition-all active:scale-95 border-white/5 hover:bg-white/5">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="cleaning_services">cleaning_services</span>
<span class="font-label-md text-[10px]">Sanitation</span>
</button>
<button class="glass-panel py-3 rounded-xl flex flex-col items-center justify-center gap-1 transition-all active:scale-95 border-white/5 hover:bg-white/5">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="construction">construction</span>
<span class="font-label-md text-[10px]">Infra</span>
</button>
<button class="glass-panel py-3 rounded-xl flex flex-col items-center justify-center gap-1 transition-all active:scale-95 border-white/5 hover:bg-white/5">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="local_fire_department">local_fire_department</span>
<span class="font-label-md text-[10px]">Fire</span>
</button>
<button class="glass-panel py-3 rounded-xl flex flex-col items-center justify-center gap-1 transition-all active:scale-95 border-white/5 hover:bg-white/5">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="science">science</span>
<span class="font-label-md text-[10px]">Chemical</span>
</button>
</div>
</div>
<!-- Location Input -->
<div class="space-y-3">
<label class="font-label-md text-label-md text-primary uppercase tracking-wider">Location</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-secondary" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<input class="w-full h-12 glass-panel border-white/10 rounded-xl pl-10 pr-4 text-on-surface font-body-md focus:ring-2 focus:ring-secondary focus:border-transparent outline-none transition-all" placeholder="Scanning current coordinates..." type="text"/>
</div>
</div>
<!-- Photo Upload Dropzone -->
<div class="space-y-3">
<label class="font-label-md text-label-md text-primary uppercase tracking-wider">Visual Evidence</label>
<div class="w-full aspect-video glass-panel border-dashed border-2 border-white/20 rounded-xl flex flex-col items-center justify-center gap-2 group cursor-pointer active:scale-[0.98] transition-transform">
<div class="w-12 h-12 rounded-full bg-secondary-container/20 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="add_a_photo">add_a_photo</span>
</div>
<div class="text-center">
<p class="font-body-md text-on-surface font-semibold">Tap to Upload Photo</p>
<p class="font-label-md text-on-surface-variant">PNG, JPG up to 10MB</p>
</div>
</div>
</div>
<!-- Severity Selector -->
<div class="space-y-3">
<label class="font-label-md text-label-md text-primary uppercase tracking-wider">Risk Level</label>
<div class="flex p-1 glass-panel rounded-full overflow-hidden border-white/10">
<button class="flex-1 py-2 rounded-full font-label-md text-[10px] transition-all hover:bg-white/5">LOW</button>
<button class="flex-1 py-2 rounded-full font-label-md text-[10px] transition-all hover:bg-white/5">MED</button>
<button class="flex-1 py-2 rounded-full font-label-md text-[10px] bg-tertiary/20 text-tertiary">HIGH</button>
<button class="flex-1 py-2 rounded-full font-label-md text-[10px] transition-all hover:bg-white/5">CRIT</button>
</div>
</div>
<!-- Description -->
<div class="space-y-3">
<label class="font-label-md text-label-md text-primary uppercase tracking-wider">Incident Details</label>
<textarea class="w-full glass-panel border-white/10 rounded-xl p-4 text-on-surface font-body-md focus:ring-2 focus:ring-secondary focus:border-transparent outline-none transition-all resize-none" placeholder="Describe the hazard and any immediate dangers..." rows="4"></textarea>
</div>
</div>
<!-- Submit Button -->
<div class="py-4">
<button class="w-full h-14 bg-secondary text-on-secondary font-headline-md text-headline-md-mobile rounded-full shadow-lg shadow-secondary/20 transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="send" style="font-variation-settings: 'FILL' 1;">send</span>
                Submit Hazard Report
            </button>
</div>
</main>
<!-- Bottom Navigation Bar (Hidden on Desktop) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center py-2 px-gutter pb-6 bg-surface-container/80 dark:bg-surface-container-highest/80 backdrop-blur-xl border-t border-white/10 rounded-t-xl md:hidden">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary-container/20 p-2 rounded-xl transition-all" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label-md text-label-md">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 transition-transform active:scale-90 shadow-md" href="#">
<span class="material-symbols-outlined" data-icon="add_alert" style="font-variation-settings: 'FILL' 1;">add_alert</span>
<span class="font-label-md text-label-md">Report</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-primary-container/20 p-2 rounded-xl transition-all relative" href="#">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="font-label-md text-label-md">Alerts</span>
<span class="absolute top-2 right-4 w-2 h-2 bg-error rounded-full"></span>
</a>
</nav>
<!-- Background Atmospheric Effect -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-20">

</div>
<script>
        // Simple Interaction Logic for Severity Buttons
        const severityButtons = document.querySelectorAll('.flex.p-1.glass-panel button');
        const severityColors = {
            'LOW': 'text-secondary bg-secondary/10',
            'MED': 'text-primary bg-primary/10',
            'HIGH': 'text-tertiary bg-tertiary/10',
            'CRIT': 'text-error bg-error/10'
        };

        severityButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                severityButtons.forEach(b => {
                    b.className = 'flex-1 py-2 rounded-full font-label-md text-[10px] transition-all hover:bg-white/5';
                });
                const key = btn.innerText;
                btn.className = `flex-1 py-2 rounded-full font-label-md text-[10px] transition-all severity-btn-active ${severityColors[key]}`;
            });
        });

        // Category Toggle Logic
        const categoryButtons = document.querySelectorAll('.grid-cols-3 button');
        categoryButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryButtons.forEach(b => {
                    b.classList.remove('bg-primary-container/20', 'border-primary/20');
                    b.classList.add('border-white/5');
                    b.querySelector('span:first-child').classList.remove('text-primary');
                    b.querySelector('span:first-child').classList.add('text-on-surface-variant');
                });
                btn.classList.add('bg-primary-container/20', 'border-primary/20');
                btn.classList.remove('border-white/5');
                btn.querySelector('span:first-child').classList.add('text-primary');
                btn.querySelector('span:first-child').classList.remove('text-on-surface-variant');
            });
        });
    </script>
</body></html>
